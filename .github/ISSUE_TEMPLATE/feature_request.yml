name: Feature Request
description: Suggest a new feature or improvement.
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        **Before opening this request:**
        - Check the roadmap in the README — your idea may already be planned.
        - Check open issues to avoid duplicates.
        - Keep requests scoped and specific. "Better NPCs" will be closed. "Show the relationship level as a number next to the NPC name in the interaction menu" is actionable.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the situation or frustration this would address. Focus on the problem, not the solution.
      placeholder: "I can't tell how close I am to the next relationship tier without guessing."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe what you want to happen. Be specific about the behavior, not just the concept.
      placeholder: "Display the current relationship value (e.g. 47/100) in the NPC interaction menu next to the NPC's name."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you thought of other ways to solve this? Why are they not good enough?
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Which part of the mod does this relate to?
      options:
        - NPC System & Spawning
        - Relationships & Favor Quests
        - Dialog & Notifications
        - NPC AI & Behavior
        - Settings / Difficulty
        - Multiplayer
        - Mod Compatibility
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Anything Else?
      description: Screenshots, mockups, or any extra context.
    validations:
      required: false
