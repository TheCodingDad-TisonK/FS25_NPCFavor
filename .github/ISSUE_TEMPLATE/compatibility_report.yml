name: Compatibility Report
description: This mod conflicts with or behaves incorrectly alongside another mod.
labels: ["compatibility", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template when FS25_NPCFavor causes or experiences problems specifically because of another mod being loaded at the same time.

        If the issue happens without any other mods loaded, use the Bug Report template instead.

  - type: input
    id: mod_version
    attributes:
      label: NPCFavor Version
      placeholder: "e.g. 1.2.2.6"
    validations:
      required: true

  - type: input
    id: game_version
    attributes:
      label: Farming Simulator 25 Version
      placeholder: "e.g. 1.4.0.0"
    validations:
      required: true

  - type: input
    id: other_mod
    attributes:
      label: Conflicting Mod Name
      description: Exact name as shown in the mod manager or modDesc.xml.
      placeholder: "e.g. FS25_SeasonalCropStress"
    validations:
      required: true

  - type: input
    id: other_mod_version
    attributes:
      label: Conflicting Mod Version
      placeholder: "e.g. 1.0.1.0"
    validations:
      required: true

  - type: input
    id: other_mod_source
    attributes:
      label: Where did you get the conflicting mod?
      description: ModHub, GitHub link, or other source.
      placeholder: "https://github.com/..."
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What is the conflict?
      description: Describe exactly what goes wrong. Wrong values? Crash? NPC dialog missing? Be specific.
      placeholder: "When FS25_SeasonalCropStress is loaded, the NPC dialog box opens but shows no text."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How to trigger the conflict reliably.
    validations:
      required: true

  - type: textarea
    id: isolation
    attributes:
      label: Isolation Test
      description: Did you confirm the issue disappears when the conflicting mod is removed?
      placeholder: "Yes — removing FS25_SeasonalCropStress restores NPC dialog correctly."
    validations:
      required: true

  - type: textarea
    id: log
    attributes:
      label: Log Snippet
      description: Paste all `[NPC Favor]` lines from your log.txt, plus any errors in the same session.
      render: text
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Anything Else?
    validations:
      required: false
